# Semgrep configuration for LaunchKit.ai security scanning
rules:
  # JavaScript/TypeScript security rules
  - https://semgrep.dev/c/p/javascript
  - https://semgrep.dev/c/p/typescript
  - https://semgrep.dev/c/p/nodejs
  - https://semgrep.dev/c/p/react
  - https://semgrep.dev/c/p/nextjs

  # Security-focused rulesets
  - https://semgrep.dev/c/p/security-audit
  - https://semgrep.dev/c/p/secrets
  - https://semgrep.dev/c/p/sql-injection
  - https://semgrep.dev/c/p/xss

  # Supply chain security
  - https://semgrep.dev/c/p/supply-chain

# Exclude patterns
exclude:
  - 'node_modules/'
  - '.next/'
  - 'dist/'
  - 'build/'
  - 'coverage/'
  - '.git/'
  - '*.test.ts'
  - '*.test.tsx'
  - '*.spec.ts'
  - '*.spec.tsx'
  - 'test-*.db'

# Severity configuration
severity:
  # Fail on high and critical issues
  error:
    - 'ERROR'
    - 'WARNING'

  # Report but don't fail on info
  info:
    - 'INFO'

# Custom rules for LaunchKit.ai
custom_rules:
  - id: hardcoded-api-keys
    pattern: |
      $KEY = "sk_live_..."
    message: 'Hardcoded Stripe live API key detected'
    severity: ERROR
    languages: [javascript, typescript]

  - id: console-log-in-production
    pattern: |
      console.log($...ARGS)
    message: 'console.log found - use structured logging'
    severity: WARNING
    languages: [javascript, typescript]
    paths:
      include:
        - 'apps/api/src/'
      exclude:
        - '**/*.test.*'
        - '**/*.spec.*'

  - id: database-raw-query
    pattern: |
      $DB.$raw($QUERY)
    message: 'Raw database query detected - ensure parameterization'
    severity: WARNING
    languages: [javascript, typescript]

  - id: missing-input-validation
    pattern: |
      app.$METHOD($PATH, async ($REQ, $RES) => {
        ...
      })
    message: 'API endpoint missing input validation'
    severity: INFO
    languages: [javascript, typescript]
    paths:
      include:
        - 'apps/api/src/'
