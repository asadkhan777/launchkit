version: 2
updates:
  # Root workspace dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    target-branch: 'main'
    reviewers:
      - 'asadkhan'
    assignees:
      - 'asadkhan'
    commit-message:
      prefix: 'deps(root)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'workspace-root'
    groups:
      workspace-tools:
        patterns:
          - 'turbo'
          - '@changesets/*'
          - 'husky'
          - 'lint-staged'
          - 'prettier'
      linting-tools:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - '@typescript-eslint/*'
      build-tools:
        patterns:
          - 'typescript'
          - 'vite*'
          - '@types/*'

  # API package dependencies
  - package-ecosystem: 'npm'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '09:00'
    target-branch: 'main'
    reviewers:
      - 'asadkhan'
    assignees:
      - 'asadkhan'
    commit-message:
      prefix: 'deps(api)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'api'
    groups:
      fastify-ecosystem:
        patterns:
          - '@fastify/*'
          - 'fastify*'
      observability:
        patterns:
          - '@opentelemetry/*'
          - '@sentry/*'
      database:
        patterns:
          - '@prisma/*'
          - 'prisma'
      testing:
        patterns:
          - 'vitest'
          - 'supertest'
          - '@types/*'
          - 'testcontainers'

  # Web package dependencies
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
      time: '09:00'
    target-branch: 'main'
    reviewers:
      - 'asadkhan'
    assignees:
      - 'asadkhan'
    commit-message:
      prefix: 'deps(web)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'web'
    groups:
      next-ecosystem:
        patterns:
          - 'next'
          - '@next/*'
      react-ecosystem:
        patterns:
          - 'react'
          - 'react-*'
          - '@types/react*'
      styling:
        patterns:
          - 'tailwindcss'
          - 'autoprefixer'
          - 'postcss'

  # UI package dependencies
  - package-ecosystem: 'npm'
    directory: '/packages/ui'
    schedule:
      interval: 'weekly'
      day: 'thursday'
      time: '09:00'
    target-branch: 'main'
    reviewers:
      - 'asadkhan'
    assignees:
      - 'asadkhan'
    commit-message:
      prefix: 'deps(ui)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'ui'
    groups:
      react-ecosystem:
        patterns:
          - 'react'
          - 'react-*'
          - '@types/react*'
      ui-tools:
        patterns:
          - '@radix-ui/*'
          - 'class-variance-authority'
          - 'clsx'
          - 'tailwind-merge'
      storybook:
        patterns:
          - '@storybook/*'
          - 'storybook'

  # SDK package dependencies
  - package-ecosystem: 'npm'
    directory: '/packages/sdk'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '09:00'
    target-branch: 'main'
    reviewers:
      - 'asadkhan'
    assignees:
      - 'asadkhan'
    commit-message:
      prefix: 'deps(sdk)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'sdk'

  # Common package dependencies
  - package-ecosystem: 'npm'
    directory: '/packages/common'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '10:00'
    target-branch: 'main'
    reviewers:
      - 'asadkhan'
    assignees:
      - 'asadkhan'
    commit-message:
      prefix: 'deps(common)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'common'

  # Tests package dependencies
  - package-ecosystem: 'npm'
    directory: '/packages/tests'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '11:00'
    target-branch: 'main'
    reviewers:
      - 'asadkhan'
    assignees:
      - 'asadkhan'
    commit-message:
      prefix: 'deps(tests)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'tests'
    groups:
      testing-framework:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - 'playwright'
          - '@playwright/*'
          - 'jest*'
      testing-utilities:
        patterns:
          - '@axe-core/*'
          - 'axe-*'
          - 'testcontainers'
          - '@types/*'
